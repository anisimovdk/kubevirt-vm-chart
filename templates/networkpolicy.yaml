{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubevirt-vm.fullname" . }}
  labels:
    {{- include "kubevirt-vm.labels" . | nindent 4 }}
    {{- with .Values.networkPolicy.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubevirt-vm.selectorLabels" . | nindent 6 }}
      {{- with .Values.networkPolicy.podLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  {{- if or .Values.networkPolicy.ingress .Values.networkPolicy.egress }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress }}
    - Egress
    {{- end }}
  {{- end }}
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
